# Training entrypoint.
#
# All commands run from the research-runtime repository ROOT and use the single
# root-level uv environment (.venv). Training is NOT executed from inside
# project/nn-architecture, and there is no separate nested .venv.
#   - project_dir is the working directory for the training/validation command.
#     "." means the repository root.
#   - paths in `command` are therefore relative to the repository root.
project_dir: "."

local:
  enabled: true
  command: >-
    uv run python project/nn-architecture/train.py
    --exp-name {exp_name}
    --model gpt2
    --dataset wikitext
    --dataset-config wikitext-2-v1
    --output-dir output/runs/{exp_name}
    --metrics-file runtime/experiments/{exp_name}.metrics.json
    --train-steps 50
    --batch-size 8
    --block-size 256
    --lr 3e-4
    --log-every 10

  metrics_file: runtime/experiments/{exp_name}.metrics.json

metrics:
  primary: val_loss
  mode: minimize
  required_fields:
    - best_val_loss
    - final_val_loss
