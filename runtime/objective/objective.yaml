goal: |
  Explore neural network architecture variants that reduce validation loss
  compared with the current baseline while keeping implementation complexity
  and compute cost under control.

primary_metric:
  name: val_loss
  mode: minimize

success_criteria:
  description: |
    Find an architecture modification that improves validation loss over the
    current best recorded experiment and remains stable during training.
  target_metric:
    name: val_loss
    operator: "<="
    value: null

stop_conditions:
  max_iterations: 300
  no_improvement_patience: 30
  reach_target_metric: false
  manual_stop: true

constraints:
  max_params: null
  max_flops: null
  max_vram_gb: null
  max_training_hours_per_experiment: null

exploration_policy:
  prefer_architecture_changes: true
  allow_training_hyperparameter_changes: true
  allow_data_changes: false
  allow_new_dependencies: false

remote_training:
  enabled: false

  # SSH entrypoint. Local machine connects here first.
  gateway_host: mgt

  # GPU execution node, reachable from mgt.
  gpu_host: gpu01

  # Shared filesystem visible from both mgt and gpu01.
  shared_home: /share/home/liuxiaoyan

  # Remote project root for nn-architecture experiments.
  remote_project_dir: /share/home/liuxiaoyan/nn-architecture

  # Per-experiment run directory.
  remote_runs_dir: /share/home/liuxiaoyan/autoresearch-runs

  # Command template to execute on gpu01.
  # {exp_name} will be replaced by current_iteration.exp_name.
  train_command_template: |
    cd /share/home/liuxiaoyan/nn-architecture &&
    python train.py --exp-name {exp_name}

  # Log path template on shared filesystem.
  log_path_template: /share/home/liuxiaoyan/autoresearch-runs/{exp_name}/train.log

  # Launch policy.
  launch_via_gateway: true
  forbid_sleep_ssh_polling: true

notes:
  - Focus on architecture-level changes first.
  - Avoid repeating ideas listed in runtime/knowledge/rejected_ideas.md.
  - Prefer changes with clear ablation value and measurable validation-loss impact.