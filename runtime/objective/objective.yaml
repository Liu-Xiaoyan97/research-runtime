goal: |
  Explore neural network architecture variants that reduce validation loss
  compared with the current baseline while keeping implementation complexity
  and compute cost under control.

primary_metric:
  name: val_loss
  mode: minimize

success_criteria:
  description: |
    Find an architecture modification that improves validation loss over the
    current best recorded experiment and remains stable during training.
  target_metric:
    name: val_loss
    operator: "<="
    value: null

stop_conditions:
  max_iterations: 300
  no_improvement_patience: 30
  reach_target_metric: false
  manual_stop: true

constraints:
  max_params: null
  max_flops: null
  max_vram_gb: null
  max_training_hours_per_experiment: null

exploration_policy:
  prefer_architecture_changes: true
  allow_training_hyperparameter_changes: true
  allow_data_changes: false
  allow_new_dependencies: false

remote_training:
  enabled: false
  server: null
  remote_project_dir: null
  train_command_template: null
  log_path_template: null

notes:
  - Focus on architecture-level changes first.
  - Avoid repeating ideas listed in runtime/knowledge/rejected_ideas.md.
  - Prefer changes with clear ablation value and measurable validation-loss impact.